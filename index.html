<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLA UNIVERSITY E-BOOK</title>
    <style>
        /* CSS Styling - मोबाइल के लिए सेट किया गया है */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333333;
            padding: 15px;
        }

        /* Header / Logos */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header img {
            max-height: 50px;
            width: auto;
        }

        /* Breadcrumb Navigation */
        .breadcrumb {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .breadcrumb a {
            text-decoration: none;
            color: #555;
        }

        .breadcrumb .separator {
            margin: 0 8px;
            font-size: 10px;
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 480px) {
            .header img {
                max-height: 40px;
            }
            .breadcrumb {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="https://www.gla.ac.in/images/gla-university-logo1.webp" alt="GLA University">
        <img src="https://www.gla.ac.in/images/naac-logo.webp" alt="NAAC A+ Grade">
    </header>

    <nav class="breadcrumb">
        <a href="https://www.gla.ac.in/">Home</a> <span class="separator"></span> <a href="https://online-gla-university.github.io/manish/">Manish Profile</a>
    </nav>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Image + Button</title>

<style>
    body {
        margin: 2;
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
        overflow-x: hidden;
    }

    /* Image Container */
    .image-container {
        width: 80%;
        overflow: hidden;
    }

    /* Animated Image */
    .top-image {
        width: 100%;
        height: auto;
        animation: zoomEffect 6s ease-in-out infinite;
    }

    /* Zoom Animation */
    @keyframes zoomEffect {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.08); }
        100% { transform: scale(1); }
    }

    /* Button Styling */
    .btn {
        margin: 25px 0;
        padding: 15px 35px;
        font-size: 18px;
        color: white;
        background: linear-gradient(45deg, #667eea, #764ba2);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* Hover Animation */
    .btn:hover {
        transform: scale(1.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* Click Animation */
    .btn:active {
        transform: scale(0.95);
    }
</style>
</head>

<body>

<!-- IMAGE -->

<center> <div class="image-container">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh8bY8lu7oI6I3-ubRDeDWWIBls6yyDnqR0FDjjiQoMYQq5VFLPdQJQJZqh-7WgxoLYHEeDz1WLgF1eM39YUWmIjfkmMX5WHROduksLvrQQ80a52NK9HjUO-KsOYq-LuYWKbHgGbufVpY9P4O7903-O4pO7GetczClJUsqC-mekTrDOyEpxAcOlgiR7QSRn/s1800/Copy%20of%20SGMC%20NEW.jpeg" class="top-image">
</div> </center>

<!-- BUTTON -->
<button class="btn" onclick="goToLink()">Read Book</button>

<script>
function goToLink() {
    var url = "https://www.maniebook.online/2026/03/courtroom-302.html?m=1"; // 👈 अपना URL डालो
    window.location.href = url;
}
</script>

</body>
</html>
